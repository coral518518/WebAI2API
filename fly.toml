# fly.toml app configuration file generated for webai2api on 2026-05-01T10:42:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'webai2api'
primary_region = 'sin'

[build]

[processes]
  app = 'node ./dbsetup.js npm start -- -xvfb -vnc'

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
